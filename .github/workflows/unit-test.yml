name: Unit-Tests

on:
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code # ← FALTABA: descarga tu repositorio
        uses: actions/checkout@v4

      - name: Set up Python # ← FALTABA: configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s white_box -p 'test_*.py'
