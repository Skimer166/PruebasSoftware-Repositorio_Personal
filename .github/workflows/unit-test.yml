name: Unit-Tests

on:
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies # ← AGREGA ESTO
        run: pip install requests

      - name: Run Unit Tests
        run: |
          python -m unittest discover -s white_box -p 'test_*.py'
